<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - {{ nombre_tienda }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding-bottom: 40px; }
        
        .header-admin {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
        }
        
        /* Menú Hamburguesa */
        .hamburger { font-size: 28px; cursor: pointer; color: white; }
        .side-menu {
            height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; right: 0;
            background-color: #ffffff; overflow-x: hidden; transition: 0.5s; padding-top: 60px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        .side-menu a, .side-menu .menu-item { padding: 15px 25px; text-decoration: none; font-size: 16px; color: #1e293b; display: block; transition: 0.3s; cursor: pointer; }
        .side-menu a:hover { background-color: #f1f5f9; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .btn-add { background: #10b981; color: white; padding: 12px 20px; border-radius: 14px; text-decoration: none; display: inline-block; }
        .product-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; border: 1px solid #e2e8f0; }
        .product-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header-admin">
        <div>
            <h1>⚙️ Panel</h1>
            <p>{{ nombre_tienda }}</p>
        </div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </div>

    <!-- Menú Lateral -->
    <div id="sideMenu" class="side-menu">
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
        <h3 style="padding: 0 25px; margin-bottom: 20px;">Configuración</h3>
        <a href="{{ url_for('configurar_tienda', id_tienda=id_tienda) }}">🎨 Personalizar Colores y Logo</a>
        <a href="{{ url_for('cambiar_clave', id_tienda=id_tienda) }}">🔑 Cambiar Contraseña</a>
        <div class="menu-item">
            <label>📂 Activar Subcarpetas</label>
            <input type="checkbox" {% if tienda_completa.configuracion_subcarpetas %}checked{% endif %} onchange="guardarConfigSub(this)">
        </div>
        <hr>
        <a href="/logout" style="color: #ef4444;">🚪 Cerrar Sesión</a>
    </div>

    <div class="container">
        <div style="display:flex; justify-content:space-between; margin: 20px 0;">
            <h2>Mis Productos</h2>
            <a href="/tienda/{{ id_tienda }}/agregar" class="btn-add">➕ Nuevo</a>
        </div>

        {% for producto in lista_productos %}
        <div class="product-card">
            <img src="{{ producto.url_imagen }}" class="product-img" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=200';">
            <div class="product-info">
                <h3>{{ producto.nombre_producto }}</h3>
                <p>${{ "{:,.0f}".format(producto.precio|float) }}</p>
                <a href="{{ url_for('editar_producto', id_tienda=id_tienda, id_producto=producto.id_producto) }}">✏️ Editar</a>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("sideMenu");
            menu.style.width = menu.style.width === "280px" ? "0" : "280px";
        }
        function guardarConfigSub(checkbox) {
            // Aquí puedes añadir un fetch hacia una ruta backend para guardar el estado del checkbox
            alert("Preferencia de subcarpetas guardada: " + checkbox.checked);
        }
    </script>
</body>
</html>
