<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Producto - Panel del Dueño</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding: 20px 10px; }
        
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        .header-form { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; padding: 30px 20px; text-align: center; }
        .header-form span { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .header-form h1 { font-size: 22px; font-weight: 700; margin-top: 8px; margin-bottom: 4px; }
        .header-form p { font-size: 13px; opacity: 0.8; }
        
        form { padding: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 8px; }
        
        .input-wrapper { display: flex; align-items: center; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 12px; padding: 0 14px; transition: 0.3s; }
        .input-wrapper:focus-within { border-color: #3b82f6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .input-wrapper span { font-size: 16px; margin-right: 10px; color: #64748b; }
        
        .input-wrapper input, .input-wrapper select, .input-wrapper textarea { width: 100%; background: none; border: none; padding: 12px 0; font-size: 15px; color: #1e293b; outline: none; }
        .input-wrapper textarea { resize: none; height: 70px; }
        
        .btn-submit { width: 100%; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(16, 185, 129, 0.4); }
        
        .btn-back { display: block; text-align: center; color: #64748b; font-size: 14px; font-weight: 600; text-decoration: none; margin-top: 20px; transition: 0.3s; }
        .btn-back:hover { color: #1e293b; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-form">
            <span>👤 Panel del Dueño</span>
            <h1>Añadir Producto</h1>
            <p>Registra mercancía nueva en tiempo real para tus clientes</p>
        </div>
        
        <form action="/tienda/{{ id_tienda }}/agregar" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>Nombre del Producto</label>
                <div class="input-wrapper">
                    <span>🛍️</span>
                    <input type="text" name="nombre" placeholder="Ej: Galletas Muuu Leche x6" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Precio de Venta (COP)</label>
                <div class="input-wrapper">
                    <span>$</span>
                    <input type="number" name="precio" placeholder="Ej: 5400" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Categoría del Producto</label>
                <div class="input-wrapper">
                    <span>🥞</span>
                    <select name="categoria" required>
                        <option value="" disabled selected>Selecciona una categoría...</option>
                        <option value="abarrotes">🌾 Abarrotes</option>
                        <option value="lacteos">🥛 Lácteos</option>
                        <option value="aseo">🧼 Aseo</option>
                        <option value="dulceria">🍬 Dulcería / Mecato</option>
                         <option value="bebidas">🍾Bebidas</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Descripción Corta / Presentación</label>
                <div class="input-wrapper">
                    <span>📝</span>
                    <textarea name="descripcion" placeholder="Ej: Paquete tradicional por 6 unidades o 400 gramos"></textarea>
                </div>
            </div>
            
            <div class="form-group">
                <label>Foto del Producto (Galería o Cámara)</label>
                <div class="input-wrapper" style="padding: 6px 14px;">
                    <input type="file" name="imagen" accept="image/*" required>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">✅ Guardar Producto</button>
            
            <a href="/tienda/{{ id_tienda }}/admin" class="btn-back">⬅️ Volver al Panel de Control</a>
        </form>
    </div>

</body>
</html>
